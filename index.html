<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Switchboard UI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #111; color: #eee; height: 100vh; display: flex; justify-content: center; align-items: stretch; padding: 20px; }
    #app { display: flex; gap: 20px; width: 100%; max-width: 1400px; height: 100%; }
    #left { flex: 3; display: flex; flex-direction: column; }
    #right { flex: 1; background: #181818; border-radius: 8px; padding: 16px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
    #search { width: 100%; padding: 10px; margin-bottom: 16px; background: #222; border: 1px solid #444; color: #eee; border-radius: 4px; }
    #board { flex: 1; background: #151515; border-radius: 8px; border: 1px solid #333; padding: 16px; overflow: auto; }
    .section-wrapper { margin-bottom: 18px; border-radius: 6px; border: 1px solid #333; background: #101010; padding: 10px; }
    .section-title { font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: #aaa; margin-bottom: 8px; }
    .section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .column { background: #181818; border-radius: 4px; border: 1px solid #333; padding: 6px 4px; display: flex; flex-direction: column; gap: 2px; }
    .slot-row { display: grid; grid-template-columns: 26px 1fr; align-items: center; min-height: 26px; }
    .slot-label { font-size: 11px; color: #888; text-align: right; padding-right: 4px; }
    .slot-body { position: relative; height: 26px; display: flex; align-items: center; }
    .breaker { position: absolute; left: 0; right: 0; cursor: pointer; display: flex; justify-content: center; }
    .breaker-body-1p { width: 18px; height: 24px; background: #d0d0d0; border: 1px solid #555; border-radius: 3px; position: relative; }
    .breaker-body-1p::before { content: ""; position: absolute; left: 50%; top: 3px; width: 6px; height: 18px; margin-left: -3px; background: #444; border-radius: 2px; }
    .rocker-3p { display: flex; flex-direction: row; gap: 2px; height: 24px; }
    .paddle { width: 10px; height: 24px; background: #d0d0d0; border: 1px solid #555; border-radius: 3px; position: relative; }
    .paddle::before { content: ""; position: absolute; left: 50%; top: 3px; width: 4px; height: 18px; margin-left: -2px; background: #444; border-radius: 2px; }
    .rcbo { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .rcbo-head { width: 40px; height: 16px; background: #d0d0d0; border: 1px solid #555; border-radius: 3px; display: flex; justify-content: space-between; padding: 2px 3px; }
    .rcbo-test { width: 8px; height: 8px; background: #ff8800; border-radius: 50%; }
    .rcbo-indicator { width: 10px; height: 8px; background: #0f0; border-radius: 2px; }
    #fault-btn { width: 100%; padding: 8px; margin-top: 10px; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
<div id="app">
  <div id="left">
    <input id="search" type="text" placeholder="Search circuits…">
    <div id="board"></div>
    <button id="fault-btn">Toggle Fault Mode</button>
  </div>
  <div id="right">
    <h2>Details</h2>
    <div id="details">Select a breaker…</div>
  </div>
</div>

<script>
const boardData = [
  {
    name: "SECTION 1",
    tripStyle: "center",
    left: [
      { slot: 1, size: 1, type: "1p", label: "Lights" },
      { slot: 2, size: 3, type: "3p", label: "Aircon" },
      { slot: 6, size: 4, type: "3p-rcd", label: "Workshop RCBO" }
    ],
    right: [
      { slot: 1, size: 1, type: "1p", label: "GPOs" },
      { slot: 3, size: 3, type: "3p", label: "Pool Pump" }
    ]
  }
];

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  boardData.forEach(section => {
    const wrap = document.createElement("div");
    wrap.className = "section-wrapper";
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = section.name;
    wrap.appendChild(title);
    const grid = document.createElement("div");
    grid.className = "section";
    grid.appendChild(buildColumn(section.left, "left", section));
    grid.appendChild(buildColumn(section.right, "right", section));
    wrap.appendChild(grid);
    board.appendChild(wrap);
  });
}

function buildColumn(breakers, side, section) {
  const col = document.createElement("div");
  col.className = "column";
  const slots = Array(24).fill(null);
  breakers.forEach(b => { for (let i = 0; i < b.size; i++) slots[b.slot - 1 + i] = b; });
  for (let i = 0; i < 24; i++) {
    const row = document.createElement("div");
    row.className = "slot-row";
    const label = document.createElement("div");
    label.className = "slot-label";
    label.textContent = i + 1;
    row.appendChild(label);
    const body = document.createElement("div");
    body.className = "slot-body";
    const breaker = slots[i];
    if (breaker && breaker.slot - 1 === i) {
      const el = renderBreaker(breaker, side, section);
      const h = 26 * breaker.size;
      el.style.height = h + "px";
      body.style.height = h + "px";
      row.style.minHeight = h + "px";
      body.appendChild(el);
    }
    row.appendChild(body);
    col.appendChild(row);
  }
  return col;
}

function renderBreaker(b, side, section) {
  const el = document.createElement("div");
  el.className = "breaker";
  el.dataset.type = b.type;
  el.dataset.label = b.label;
  el.addEventListener("click", () => showDetails(b, side, section));
  if (b.type === "1p") {
    const body = document.createElement("div");
    body.className = "breaker-body-1p";
    el.appendChild(body);
    return el;
  }
  if (b.type === "3p") {
    const rock = document.createElement("div");
    rock.className = "rocker-3p";
    for (let i = 0; i < 3; i++) {
      const pad = document.createElement("div");
      pad.className = "paddle";
      rock.appendChild(pad);
    }
    el.appendChild(rock);
    return el;
  }
  if (b.type === "3p-rcd") {
    const rcbo = document.createElement("div");
    rcbo.className = "rcbo";
    const head = document.createElement("div");
    head.className = "rcbo-head";
    const test = document.createElement("div");
    test.className = "rcbo-test";
    const ind = document.createElement("div");
    ind.className = "rcbo-indicator";
    head.appendChild(test);
    head.appendChild(ind);
    const body = document.createElement("div");
    body.className = "rcbo-body";
    const rock = document.createElement("div");
    rock.className = "rocker-3p";
    for (let i = 0; i < 3; i++) {
      const pad = document.createElement("div");
      pad.className = "paddle";
      rock.appendChild(pad);
    }
    body.appendChild(rock);
    rcbo.appendChild(head);
    rcbo.appendChild(body);
    el.appendChild(rcbo);
    return el;
  }
  return el;
}

function showDetails(b, side, section) {
  document.getElementById("details").textContent =
    `Label: ${b.label}\nType: ${b.type}\nSize: ${b.size}\nSide: ${side}\nSection: ${section.name}`;
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll(".breaker").forEach(b => {
    const label = (b.dataset.label || "").toLowerCase();
    b.style.outline = q && label.includes(q) ? "2px solid #ff0" : "none";
  });
});

let fault = false;
document.getElementById("fault-btn").addEventListener("click", () => {
  fault = !fault;
  document.querySelectorAll(".rcbo-indicator").forEach(ind => {
    ind.style.background = fault ? "#f00" : "#0f0";
  });
});

renderBoard();
</script>
</body>
</html>
