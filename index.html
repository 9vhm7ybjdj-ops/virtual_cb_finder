<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Switchboard Visual</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* -----------------------------------------------------------
   GLOBAL LAYOUT + THEME
----------------------------------------------------------- */

body {
  margin: 0;
  padding: 0;
  background: #111;
  color: #eee;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

#app {
  display: flex;
  width: 100%;
  height: 100%;
}

/* Left = switchboard, Right = details panel */
#left {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

#right {
  width: 320px;
  padding: 20px;
  background: #1a1a1a;
  border-left: 2px solid #333;
  overflow-y: auto;
}

/* Section titles */
.section-title {
  font-size: 20px;
  margin: 20px 0 10px;
  color: #f0f0f0;
}

/* -----------------------------------------------------------
   SWITCHBOARD GRID
----------------------------------------------------------- */

.section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 40px;
}

.column {
  display: grid;
  grid-template-rows: repeat(24, 28px);
  gap: 4px;
  background: #222;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #333;
}

/* Slot numbers */
.slot-label {
  font-size: 10px;
  color: #aaa;
  margin-bottom: -2px;
}

/* -----------------------------------------------------------
   BREAKERS (ALL TYPES)
----------------------------------------------------------- */

.breaker {
  background: #2d2d2d;
  border: 1px solid #444;
  border-radius: 4px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  overflow: hidden;
}

/* Highlight when searched */
.breaker.search-hit {
  outline: 2px solid #ffb000;
}

/* -----------------------------------------------------------
   1‑POLE BREAKER (vertical paddle)
----------------------------------------------------------- */

.breaker-body-1p {
  width: 70%;
  height: 80%;
  background: #e5e7eb;
  border: 1px solid #000;
  border-radius: 3px;
  transition: transform 0.1s ease-out;
}

.breaker-body-1p[data-pos="left"]   { transform: translateX(-4px); }
.breaker-body-1p[data-pos="center"] { transform: translateX(0); }
.breaker-body-1p[data-pos="right"]  { transform: translateX(4px); }

/* -----------------------------------------------------------
   3‑PHASE BREAKER (THE ONE YOU WANT)
   Three vertical paddles, side‑by‑side, spanning 3 slots
----------------------------------------------------------- */

.breaker[data-type="3p"],
.breaker[data-type="3p-rcd"] {
  grid-row: span 3;
}

.rocker-3p {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* ← three vertical paddles side‑by‑side */
  width: 90%;
  height: 90%;
  transition: transform 0.1s ease-out;
}

.rocker-3p .paddle {
  background: #e5e7eb;
  border: 1px solid #000;
  border-radius: 3px;
}

/* horizontal throw */
.rocker-3p[data-pos="left"]   { transform: translateX(-4px); }
.rocker-3p[data-pos="center"] { transform: translateX(0); }
.rocker-3p[data-pos="right"]  { transform: translateX(4px); }

/* -----------------------------------------------------------
   RCBO (4‑module)
   Top = test button + indicator
   Bottom = 3‑phase rocker
----------------------------------------------------------- */

.rcbo {
  display: grid;
  grid-template-rows: 1fr 3fr;
  width: 90%;
  height: 90%;
}

.rcbo-head {
  background: #dcdcdc;
  border: 1px solid #000;
  border-radius: 3px 3px 0 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 4px;
}

.rcbo-test {
  width: 14px;
  height: 14px;
  background: #fff;
  border: 1px solid #000;
  border-radius: 50%;
}

.rcbo-indicator {
  width: 10px;
  height: 10px;
  background: #0f0;
  border: 1px solid #000;
  border-radius: 2px;
}

.rcbo-body {
  border: 1px solid #000;
  border-top: none;
  border-radius: 0 0 3px 3px;
  background: #2d2d2d;
  display: flex;
  align-items: center;
  justify-content: center;
}

</style>
</head>
<body>
<div id="app">

  <div id="left">

    <!-- SEARCH BAR -->
    <input id="search" type="text" placeholder="Search circuits…" 
           style="width:100%;padding:10px;margin-bottom:20px;
                  background:#222;border:1px solid #444;color:#eee;
                  border-radius:4px;">

    <!-- SWITCHBOARD RENDER TARGET -->
    <div id="board"></div>

  </div>

  <div id="right">
    <h2>Details</h2>
    <div id="details">Select a breaker…</div>
  </div>

</div>

<script>

/* -----------------------------------------------------------
   SWITCHBOARD DATA (EDIT THIS TO MATCH YOUR REAL BOARD)
   Each section has left + right columns, each with 24 slots.
   Breakers specify: slot, size, type, label.
----------------------------------------------------------- */

const boardData = [
  {
    name: "SECTION 1",
    tripStyle: "center",
    left: [
      { slot: 1, size: 1, type: "1p", label: "Lights" },
      { slot: 2, size: 3, type: "3p", label: "Aircon" },
      { slot: 6, size: 4, type: "3p-rcd", label: "Workshop RCBO" },
    ],
    right: [
      { slot: 1, size: 1, type: "1p", label: "GPOs" },
      { slot: 3, size: 3, type: "3p", label: "Pool Pump" },
    ]
  },

  {
    name: "SECTION 2",
    tripStyle: "center",
    left: [
      { slot: 1, size: 1, type: "1p", label: "Lights 2" },
    ],
    right: [
      { slot: 1, size: 3, type: "3p", label: "Shed" },
    ]
  },

  {
    name: "SECTION 3",
    tripStyle: "center",
    left: [],
    right: []
  },

  {
    name: "SECTION 4",
    tripStyle: "off",
    left: [
      { slot: 1, size: 3, type: "3p", label: "Main Feed" },
    ],
    right: []
  }
];

/* -----------------------------------------------------------
   RENDERING ENGINE — BUILDS THE ENTIRE BOARD
----------------------------------------------------------- */

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  boardData.forEach((section, sIndex) => {
    const secEl = document.createElement("div");

    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = section.name;
    secEl.appendChild(title);

    const secGrid = document.createElement("div");
    secGrid.className = "section";

    const leftCol = buildColumn(section.left, "left", section);
    const rightCol = buildColumn(section.right, "right", section);

    secGrid.appendChild(leftCol);
    secGrid.appendChild(rightCol);

    secEl.appendChild(secGrid);
    board.appendChild(secEl);
  });
}

function buildColumn(breakers, side, section) {
  const col = document.createElement("div");
  col.className = "column";

  // 24 slots
  const slots = Array(24).fill(null);

  // place breakers
  breakers.forEach(b => {
    for (let i = 0; i < b.size; i++) {
      slots[b.slot - 1 + i] = b;
    }
  });

  // render slots
  for (let i = 0; i < 24; i++) {
    const slotWrap = document.createElement("div");

    const label = document.createElement("div");
    label.className = "slot-label";
    label.textContent = i + 1;
    slotWrap.appendChild(label);

    const breaker = slots[i];
    if (breaker && breaker.slot - 1 === i) {
      const bEl = renderBreaker(breaker, side, section);
      slotWrap.appendChild(bEl);
    } else if (!breaker) {
      const empty = document.createElement("div");
      empty.style.height = "24px";
      slotWrap.appendChild(empty);
    }

    col.appendChild(slotWrap);
  }

  return col;
}
/* -----------------------------------------------------------
   RENDER A BREAKER (1‑pole, 3‑phase, RCBO)
----------------------------------------------------------- */

function renderBreaker(b, side, section) {
  const el = document.createElement("div");
  el.className = "breaker";
  el.dataset.type = b.type;
  el.dataset.label = b.label;

  // click → show details
  el.addEventListener("click", () => showDetails(b, side, section));

  // determine rocker position
  const pos = rockerPos(section, side, false);

  // 1‑pole
  if (b.type === "1p") {
    const body = document.createElement("div");
    body.className = "breaker-body-1p";
    body.dataset.pos = pos;
    el.appendChild(body);
    return el;
  }

  // 3‑phase (3 vertical paddles)
  if (b.type === "3p") {
    const rock = document.createElement("div");
    rock.className = "rocker-3p";
    rock.dataset.pos = pos;

    for (let i = 0; i < 3; i++) {
      const pad = document.createElement("div");
      pad.className = "paddle";
      rock.appendChild(pad);
    }

    el.appendChild(rock);
    return el;
  }

  // RCBO (4‑module: head + 3‑phase rocker)
  if (b.type === "3p-rcd") {
    const rcbo = document.createElement("div");
    rcbo.className = "rcbo";

    // head
    const head = document.createElement("div");
    head.className = "rcbo-head";

    const testBtn = document.createElement("div");
    testBtn.className = "rcbo-test";

    const indicator = document.createElement("div");
    indicator.className = "rcbo-indicator";

    head.appendChild(testBtn);
    head.appendChild(indicator);

    // body (3‑phase rocker)
    const body = document.createElement("div");
    body.className = "rcbo-body";

    const rock = document.createElement("div");
    rock.className = "rocker-3p";
    rock.dataset.pos = pos;

    for (let i = 0; i < 3; i++) {
      const pad = document.createElement("div");
      pad.className = "paddle";
      rock.appendChild(pad);
    }

    body.appendChild(rock);

    rcbo.appendChild(head);
    rcbo.appendChild(body);

    el.appendChild(rcbo);
    return el;
  }

  return el;
}

/* -----------------------------------------------------------
   ROCKER POSITION LOGIC
   left / center / right depending on section + fault state
----------------------------------------------------------- */

function rockerPos(section, side, isFault) {
  // normal ON position
  if (!isFault) {
    return side === "left" ? "right" : "left";
  }

  // sections 1–3 trip to center
  if (section.tripStyle === "center") {
    return "center";
  }

  // section 4 trips fully off
  return side === "left" ? "left" : "right";
}

/* -----------------------------------------------------------
   DETAILS PANEL
----------------------------------------------------------- */

function showDetails(b, side, section) {
  const d = document.getElementById("details");
  d.innerHTML = `
    <div style="font-size:18px;margin-bottom:10px;">${b.label}</div>
    <div><b>Type:</b> ${b.type}</div>
    <div><b>Size:</b> ${b.size} modules</div>
    <div><b>Side:</b> ${side}</div>
    <div><b>Section:</b> ${section.name}</div>
  `;
}
/* -----------------------------------------------------------
   SEARCH SYSTEM — HIGHLIGHT MATCHING BREAKERS
----------------------------------------------------------- */

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const breakers = document.querySelectorAll(".breaker");

  breakers.forEach(b => {
    const label = b.dataset.label.toLowerCase();
    if (q && label.includes(q)) {
      b.classList.add("search-hit");
    } else {
      b.classList.remove("search-hit");
    }
  });
});

/* -----------------------------------------------------------
   FAULT MODE (SIMULATED)
   This toggles breakers into fault positions for demo purposes.
----------------------------------------------------------- */

let faultActive = false;

function toggleFault() {
  faultActive = !faultActive;

  const breakers = document.querySelectorAll(".breaker");

  breakers.forEach(b => {
    const type = b.dataset.type;
    const sectionName = b.closest(".section").querySelector(".section-title").textContent;
    const section = boardData.find(s => s.name === sectionName);

    const side = b.closest(".column").previousSibling ? "left" : "right";

    const pos = rockerPos(section, side, faultActive);

    if (type === "1p") {
      const body = b.querySelector(".breaker-body-1p");
      if (body) body.dataset.pos = pos;
    }

    if (type === "3p") {
      const rock = b.querySelector(".rocker-3p");
      if (rock) rock.dataset.pos = pos;
    }

    if (type === "3p-rcd") {
      const rock = b.querySelector(".rocker-3p");
      if (rock) rock.dataset.pos = pos;

      const indicator = b.querySelector(".rcbo-indicator");
      if (indicator) indicator.style.background = faultActive ? "#f00" : "#0f0";
    }
  });
}

/* -----------------------------------------------------------
   ADD FAULT BUTTON
----------------------------------------------------------- */

const faultBtn = document.createElement("button");
faultBtn.textContent = "Toggle Fault Mode";
faultBtn.style.cssText = `
  width: 100%;
  padding: 10px;
  margin-top: 20px;
  background: #333;
  color: #eee;
  border: 1px solid #555;
  border-radius: 4px;
  cursor: pointer;
`;
faultBtn.addEventListener("click", toggleFault);

document.getElementById("left").appendChild(faultBtn);

/* -----------------------------------------------------------
   INITIAL RENDER
----------------------------------------------------------- */

renderBoard();

</script>
</body>
</html>
